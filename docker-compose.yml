services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rl-smartparking-backend
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
    ports:
      - "5001:5001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001
    container_name: rl-smartparking-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
