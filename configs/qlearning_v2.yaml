# Explored Q-Learning Configuration
# Higher learning rate and slower epsilon decay for more exploration
training:
  episodes: 1000
  model_name: "policy_v2_explored.pkl"

environment:
  slot_count: 12
  max_steps: 80
  arrival_chance: 0.75
  departure_chance: 0.12
  max_waiting: 8
  target_occupancy: 0.85
  seed: null

agent:
  learning_rate: 0.15
  discount_factor: 0.95
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995
